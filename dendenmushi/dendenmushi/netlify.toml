# netlify.toml — Den Den Mushi TCG
# Proyecto 100% estático, cero backend

[build]
  publish = "."

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# El JS de cartas puede cachearse agresivamente (solo cambia si actualizas el JSON)
[[headers]]
  for = "/js/cartas.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/algorithm.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/app.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
